<!DOCTYPE html>
<html>
<head>
    <title>SnigJi</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
</head>
<style>
    body, html {
        height: 100%;
        margin: 0;
    }

    .bg-img {
        background-image: url('/assets/background.jpg');
        height: 100%;
        background-position: center;
        background-size: cover;
        position: relative;
        color: white;
        font-family: "Courier New", Courier, monospace;
        font-size: 25px;
    }

    .top-left {
        position: absolute;
        top: 0;
        left: 16px;
    }

    .bottom-left {
        position: absolute;
        bottom: 0;
        left: 16px;
        font-size: 16px;
    }

    .middle {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
    }

    hr {
        margin: auto;
        width: 40%;
    }

</style>
<body>

<div class="bg-img">
    <p class="top-left">Snigdhajyoti Ghosh</p>

    <div class="middle">
        <h1>SnigJi's world</h1>
        <hr>
        <marquee behavior="alternate">
            <p>COMING SOON</p>
        </marquee>
    </div>
    <p class="bottom-left"><a href="mailto:hello@snigji.com">hello@snigji.com</a></p>
</div>

</body>
</html>
